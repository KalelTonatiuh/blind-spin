// ── Tags ──────────────────────────────────────────────────────────────────────
async function fetchTags(mbid) {
  try {
    const data = await apiFetch(`/api/mb/release-group/${mbid}?inc=tags+genres`, 'tags');
    const tags   = (data.tags   || []).map(t => ({ name: t.name, count: t.count || 0 }));
    const genres = (data.genres || []).map(g => ({ name: g.name, count: g.count || 0 }));
    const seen = new Set();
    const merged = [...genres, ...tags].filter(t => {
      if (seen.has(t.name)) return false;
      seen.add(t.name); return true;
    });
    merged.sort((a,b) => b.count - a.count);
    const names = merged.slice(0,10).map(t=>t.name).filter(Boolean);
    log(`[tags] ${names.length} tags: ${names.join(', ')||'none'}`, names.length ? 'ok' : 'dim');
    return names;
  } catch(e) {
    log(`[tags] err: ${e.message}`, 'warn');
    return [];
  }
}

// ── Cover art ─────────────────────────────────────────────────────────────────
async function fetchCoverUrl(mbid, artist, title) {
  // Try CAA first — fetch directly, don't throw on 404
  try {
    const resp = await fetch(`/api/caa/release-group/${mbid}`);
    const data = await resp.json();
    const front = (data.images||[]).find(i => i.front);
    if (front) {
      const url = front.thumbnails?.['250'] || front.thumbnails?.small || front.image;
      if (url) { log(`[cover] caa ok`, 'ok'); return url; }
    }
    log('[cover] caa: no front image', 'dim');
  } catch(e) {
    log(`[cover] caa failed: ${e.message}`, 'dim');
  }
  // Fallback: Discogs image search
  log('[cover] trying discogs fallback...', 'dim');
  try {
    const q = encodeURIComponent(artist) + '&title=' + encodeURIComponent(title);
    const data = await apiFetch(`/api/discogs/cover?artist=${q}`, 'cover');
    if (data.cover) { log('[cover] discogs fallback ok', 'ok'); return data.cover; }
  } catch(e) {
    log(`[cover] discogs fallback failed: ${e.message}`, 'dim');
  }
  return null;
}

// ── Pick group ────────────────────────────────────────────────────────────────
function pickGroup(groups, f={}) {
  const shuffled = [...groups].sort(() => Math.random() - 0.5);
  const yFrom = f.yearFrom ? parseInt(f.yearFrom) : 1930;
  const yTo   = f.yearTo   ? parseInt(f.yearTo)   : 9999;
  for (const g of shuffled) {
    const pt = (g['primary-type']||'').toLowerCase();
    const st = (g['secondary-types']||[]).map(s=>s.toLowerCase());
    if (!GOOD_TYPES.has(pt)) continue;
    if ([pt,...st].some(t => BAD_TYPES.has(t))) continue;
    // Format filter for MB: map EP/LP
    if (f.format === 'EP' && pt !== 'ep') continue;
    if (f.format === 'Album' && pt !== 'album') continue;
    const year = parseInt((g['first-release-date']||'').slice(0,4));
    if (year > 0 && (year < yFrom || year > yTo)) continue;
    const credits = g['artist-credit']||[];
    const artist = credits.map(c => typeof c === 'string' ? c : (c.artist?.name||'')).join('').trim();
    if (!artist || !g.title) continue;
    return {
      mbid:   g.id,
      artist,
      title:  g.title,
      type:   g['primary-type'] || '',
      year:   (g['first-release-date']||'').slice(0,4),
      tags:   (g.tags||[]).map(t=>t.name).filter(Boolean),
      secondaryTypes: g['secondary-types']||[],
      country: '',
      label: '',
    };
  }
  return null;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(r) {
  // Cover — update only the img, preserve blind overlay and turntable arm children
  const covEl = document.getElementById('cov');
  // Remove any previous cover img or no-art div, leave other children intact
  covEl.querySelectorAll('img, .cnone').forEach(el => el.remove());
  if (r.cover) {
    const img = document.createElement('img');
    img.src = escA(r.cover);
    img.alt = 'cover';
    img.onerror = function() { this.replaceWith(Object.assign(document.createElement('div'), {className:'cnone',textContent:'no art'})); };
    covEl.insertBefore(img, covEl.firstChild);
  } else {
    const none = document.createElement('div');
    none.className = 'cnone';
    none.textContent = 'no art';
    covEl.insertBefore(none, covEl.firstChild);
  }

  const srcLabels = { discogs: 'discogs.com', mb: 'musicbrainz.org', archive: 'archive.org', lastfm: 'last.fm' };
  document.getElementById('csrc').textContent = srcLabels[r.source] || r.source;
  document.getElementById('cart').textContent = r.artist;
  document.getElementById('ctit').textContent = r.title;

  // Pills
  const pills = document.getElementById('cpills');
  pills.innerHTML = '';
  if (r.year)    pills.innerHTML += pill(r.year);
  if (r.type && r.source !== 'archive') pills.innerHTML += pill(r.type, 'hi');
  if (r.source === 'discogs') {
    if (r.genre)    pills.innerHTML += pill(r.genre);
    if (r.country)  pills.innerHTML += pill(r.country);
  } else if (r.source === 'archive') {
    if (r.collection) pills.innerHTML += pill(r.collection.replace(/_/g, ' '));
  } else if (r.source === 'lastfm') {
    if (r.genre) pills.innerHTML += pill(r.genre);
  } else {
    if (r.country) pills.innerHTML += pill(r.country);
    for (const st of (r.secondaryTypes||[]).slice(0,2)) pills.innerHTML += pill(st);
  }

  // Stats — just MB link count for now
  document.getElementById('ssec').style.display = 'none';

  // Tags/genres
  const gsec = document.getElementById('gsec');
  const grow = document.getElementById('grow');
  const tags = (r.tags||[]).slice(0, 12);
  if (tags.length) {
    grow.innerHTML = tags.map((t,i) => {
      const col = i === 0 ? 'gt p' : ('gt gt-' + tagColor(t));
      return `<span class="${col}">${esc(t)}</span>`;
    }).join('');
    gsec.style.display = 'block';
  } else { gsec.style.display = 'none'; }

  // No tracklist from release-group endpoint (would need extra call)
  document.getElementById('dsec').style.display = 'none';

  // Links
  const lrow = document.getElementById('lrow');
  const rymQ   = encodeURIComponent(r.artist + ' ' + r.title);
  const rymUrl = `https://rateyourmusic.com/search?searchterm=${rymQ}&searchtype=l`;
  const ytUrl  = `https://www.youtube.com/results?search_query=${encodeURIComponent(r.artist+' '+r.title+' full album')}`;

  let sourceLink = '';
  if (r.source === 'discogs' && r.url) {
    sourceLink = `<a class="el" href="${escA(r.url)}" target="_blank" rel="noopener">Discogs ↗</a>`;
  } else if (r.source === 'archive' && r.url) {
    sourceLink = `<a class="el" href="${escA(r.url)}" target="_blank" rel="noopener">Archive.org ↗</a>`;
  } else if (r.source === 'lastfm' && r.url) {
    sourceLink = `<a class="el" href="${escA(r.url)}" target="_blank" rel="noopener">Last.fm ↗</a>`;
  } else if (r.mbid) {
    const mbUrl = `https://musicbrainz.org/release-group/${r.mbid}`;
    sourceLink = `<a class="el" href="${escA(mbUrl)}" target="_blank" rel="noopener">MusicBrainz ↗</a>`;
  }

  lrow.innerHTML =
    sourceLink +
    `<a class="el" href="${escA(rymUrl)}" target="_blank" rel="noopener">Search RYM ↗</a>
    <a class="el" href="${escA(ytUrl)}"  target="_blank" rel="noopener">YouTube ↗</a>`;

  // Note
  const note = document.getElementById('note');
  note.style.display = 'none';

  // Store for similar button + add to history
  lastResult = r;
  document.getElementById('simbtn').classList.add('vis');
  addToHistory(r);
  updateFavBtn();

  showCard();
  if (blindMode) {
    document.getElementById('card').classList.add('blind');
  } else {
    document.getElementById('card').classList.remove('blind');
  }
  // Drop turntable arm after card animates in
  setTimeout(() => {
    const arm = document.getElementById('turntable-arm');
    if (arm) arm.classList.add('playing');
  }, 350);
  log('rendered.', 'ok');

  // Fire info fetches async — don't block render
  fetchInfo(r);
}

// ── INFO PANEL ────────────────────────────────────────────────────────────────
async function fetchInfo(r) {
  // Reset info panel
  document.getElementById('infosec').style.display = 'none';
  document.getElementById('blurbsec').style.display = 'none';
  document.getElementById('inforow').style.display = 'none';
  document.getElementById('dsec2').style.display = 'none';

  const tasks = [];

  // Wikipedia blurb — all sources
  if (r.artist && r.artist !== 'Unknown') {
    tasks.push(
      fetch(`/api/wiki/artist?artist=${encodeURIComponent(r.artist)}`)
        .then(res => res.json())
        .then(data => {
          if (data.blurb) {
            document.getElementById('blurb-text').innerHTML =
              `<span>${esc(data.blurb)}</span>` +
              (data.wiki_title ? `<div class="blurb-src">via wikipedia · ${esc(data.wiki_title)}</div>` : '');
            document.getElementById('blurbsec').style.display = 'block';
            document.getElementById('infosec').style.display = 'block';
            log('[info] wiki blurb found', 'dim');
          }
        }).catch(() => {})
    );
  }

  // Label / catno / tracklist — Discogs only
  if (r.source === 'discogs' && r.release_id) {
    tasks.push(
      fetch(`/api/discogs/release/${r.release_id}`)
        .then(res => res.json())
        .then(data => {
          // Label + catno info row
          const inforow = document.getElementById('inforow');
          const items = [];
          const label = data.label || r.label || '';
          const catno = data.catno || r.catno || '';
          if (label) items.push(`<div class="info-item"><span class="info-lbl">Label</span><span class="info-val">${esc(label)}</span></div>`);
          if (catno) items.push(`<div class="info-item"><span class="info-lbl">Cat. no.</span><span class="info-val">${esc(catno)}</span></div>`);
          if (r.country) items.push(`<div class="info-item"><span class="info-lbl">Country</span><span class="info-val">${esc(r.country)}</span></div>`);
          if (items.length) {
            inforow.innerHTML = items.join('');
            inforow.style.display = 'flex';
            document.getElementById('infosec').style.display = 'block';
          }

          // Tracklist
          const tracks = data.tracklist || [];
          if (tracks.length) {
            const tlist = document.getElementById('tlist2');
            tlist.innerHTML = tracks.map(t =>
              `<div class="tr"><span class="tn">${esc(t.pos)}</span><span class="tt">${esc(t.title)}</span>${t.duration ? `<span class="td">${esc(t.duration)}</span>` : ''}</div>`
            ).join('');
            document.getElementById('dsec2').style.display = 'block';
            document.getElementById('infosec').style.display = 'block';
            log(`[info] ${tracks.length} tracks`, 'dim');
          }
        }).catch(() => {})
    );
  }

  // Label/catno/country for non-discogs sources (already in response)
  if (r.source !== 'discogs') {
    const inforow = document.getElementById('inforow');
    const items = [];
    if (r.label)   items.push(`<div class="info-item"><span class="info-lbl">Label</span><span class="info-val">${esc(r.label)}</span></div>`);
    if (r.catno)   items.push(`<div class="info-item"><span class="info-lbl">Cat. no.</span><span class="info-val">${esc(r.catno)}</span></div>`);
    if (r.country) items.push(`<div class="info-item"><span class="info-lbl">Country</span><span class="info-val">${esc(r.country)}</span></div>`);
    if (r.year)    items.push(`<div class="info-item"><span class="info-lbl">Year</span><span class="info-val">${esc(r.year)}</span></div>`);
    if (items.length) {
      inforow.innerHTML = items.join('');
      inforow.style.display = 'flex';
      document.getElementById('infosec').style.display = 'block';
    }
  }

  await Promise.allSettled(tasks);
}

// ── SIMILAR ──────────────────────────────────────────────────────────────────
let lastResult = null;

function spinSimilar() {
  if (!lastResult || busy) return;
  const r = lastResult;

  // Extract constraints from the last result
  const simFilters = {};

  // Genre — use first tag or genre field
  const genre = r.genre || (r.tags && r.tags[0]) || '';
  // Map to Discogs genre list if possible
  const GENRE_MAP = {
    'rock': 'Rock', 'electronic': 'Electronic', 'jazz': 'Jazz',
    'classical': 'Classical', 'hip hop': 'Hip Hop', 'hip-hop': 'Hip Hop',
    'funk': 'Funk / Soul', 'soul': 'Funk / Soul', 'latin': 'Latin',
    'reggae': 'Reggae', 'pop': 'Pop', 'blues': 'Blues',
  };
  const mappedGenre = GENRE_MAP[genre.toLowerCase()] || '';
  if (mappedGenre) simFilters.genre = mappedGenre;

  // Year — spin within ±5 years of the release
  if (r.year && parseInt(r.year) > 0) {
    const y = parseInt(r.year);
    simFilters.yearFrom = String(Math.max(1900, y - 5));
    simFilters.yearTo   = String(Math.min(2025, y + 5));
  }

  // Country — only for Discogs results where it's reliable
  if (r.source === 'discogs' && r.country) {
    simFilters.country = r.country;
  }

  // Source — stick to same source since constraints are source-specific
  simFilters.source = r.source === 'archive' ? '' : r.source;

  log(`similar: genre=${simFilters.genre||'any'} year=${simFilters.yearFrom||'?'}-${simFilters.yearTo||'?'} country=${simFilters.country||'any'}`, 'info');

  // Spin with these filters directly (bypassing the filter panel)
  spinWithFilters(simFilters);
}

async function spinWithFilters(f) {
  if (busy) return;
  busy = true;
  const btn = document.getElementById('btn');
  btn.classList.add('ld'); btn.disabled = true;
  hideCard(); clrLog();

  try {
    let source;
    if (f.source === 'discogs') source = 'discogs';
    else if (f.source === 'mb') source = 'mb';
    else if (f.source === 'archive') source = 'archive';
    else { const r = Math.random(); source = r < 0.25 ? 'mb' : r < 0.5 ? 'discogs' : r < 0.75 ? 'archive' : 'lastfm'; }

    log(`source: ${source}`, 'info');
    let rg;
    if (source === 'discogs') {
      rg = await discogsViaProxy(f);
      log(`got: "${rg.artist}" — "${rg.title}" [${rg.genre}] ${rg.year}`, 'ok');
      log(rg.cover ? 'cover included' : 'no cover', rg.cover ? 'ok' : 'dim');
    } else if (source === 'archive') {
      rg = await iaViaProxy(f);
      log(`got: "${rg.artist}" — "${rg.title}" [${rg.collection}] ${rg.year}`, 'ok');
      log(rg.cover ? 'cover included' : 'no cover', rg.cover ? 'ok' : 'dim');
    } else if (source === 'lastfm') {
      rg = await lfmViaProxy(f);
      log(`got: "${rg.artist}" — "${rg.title}" [${rg.genre}] ${rg.year}`, 'ok');
      log(rg.cover ? 'cover included' : 'no cover', rg.cover ? 'ok' : 'dim');
    } else {
      try {
        rg = await mbViaProxy(f);
      } catch(mbErr) {
        log(`[mb] failed, falling back to discogs`, 'warn');
        rg = await discogsViaProxy(f);
        log(`got: "${rg.artist}" — "${rg.title}" [${rg.genre}] ${rg.year}`, 'ok');
      }
      if (!rg.source || rg.source !== 'discogs') {
        log(`got: "${rg.artist}" — "${rg.title}" [${rg.type}] ${rg.year}`, 'ok');
        log('fetching tags...', 'dim');
        rg.tags = await fetchTags(rg.mbid);
        log('fetching cover...', 'dim');
        rg.cover = await fetchCoverUrl(rg.mbid, rg.artist, rg.title);
        log(rg.cover ? 'cover found' : 'no cover', rg.cover ? 'ok' : 'dim');
      }
    }
    render(rg);
  } catch(e) {
    log(`FATAL: ${e.message}`, 'err');
  }

  btn.classList.remove('ld'); btn.disabled = false;
  busy = false;
}



// ── HISTORY & FAVORITES ───────────────────────────────────────────────────────
const MAX_HISTORY = 20;
let history = [];
let favorites = JSON.parse(localStorage.getItem('bs_favs') || '[]');
let trayOpen = false;
let trayTab = 'history';

function addToHistory(r) {
  history.unshift({ ...r, _ts: Date.now() });
  if (history.length > MAX_HISTORY) history.pop();
  if (trayOpen && trayTab === 'history') renderTray();
  // Update tray button label
  document.getElementById('traybtn').textContent = `▲ History (${history.length})`;
}

function toggleFav() {
  if (!lastResult) return;
  const id = lastResult.url || (lastResult.mbid) || (lastResult.artist + lastResult.title);
  const idx = favorites.findIndex(f => (f.url || f.artist + f.title) === id);
  const btn = document.getElementById('favbtn');
  if (idx >= 0) {
    favorites.splice(idx, 1);
    btn.innerHTML = '<span>☆</span> Add to Favorites';
    btn.classList.remove('active');
    document.getElementById('fav-note-wrap').classList.remove('vis');
    document.getElementById('fav-note').value = '';
  } else {
    favorites.unshift({ ...lastResult, _ts: Date.now() });
    btn.innerHTML = '<span>★</span> Favorited';
    btn.classList.add('active');
    loadFavNote(lastResult);
  }
  localStorage.setItem('bs_favs', JSON.stringify(favorites));
  if (trayOpen && trayTab === 'favs') renderTray();
}

function updateFavBtn() {
  if (!lastResult) return;
  const id = lastResult.url || (lastResult.mbid) || (lastResult.artist + lastResult.title);
  const isFav = favorites.some(f => (f.url || f.artist + f.title) === id);
  const btn = document.getElementById('favbtn');
  btn.innerHTML = isFav ? '<span>★</span> Favorited' : '<span>☆</span> Add to Favorites';
  btn.classList.toggle('active', isFav);
  loadFavNote(lastResult);
}

function toggleTray() {
  trayOpen = !trayOpen;
  document.getElementById('tray').classList.toggle('open', trayOpen);
  document.getElementById('traybtn').textContent = trayOpen
    ? `▼ History (${history.length})`
    : `▲ History (${history.length})`;
  if (trayOpen) renderTray();
}

function switchTray(tab) {
  trayTab = tab;
  document.getElementById('tab-history').classList.toggle('active', tab === 'history');
  document.getElementById('tab-favs').classList.toggle('active', tab === 'favs');
  renderTray();
}

function renderTray() {
  const items = trayTab === 'history' ? history : favorites;
  const scroll = document.getElementById('tray-scroll');
  if (!items.length) {
    scroll.innerHTML = `<div style="color:#2a1e0c;font-size:0.52rem;padding:8px 0;letter-spacing:0.1em;text-transform:uppercase;">${trayTab === 'history' ? 'No history yet' : 'No favorites yet'}</div>`;
    return;
  }
  scroll.innerHTML = items.map((r, i) => {
    const thumb = r.cover
      ? `<img src="${escA(r.cover)}" alt="" onerror="this.parentElement.innerHTML='<span class=\'tray-thumb-none\'>◈</span>'">`
      : '<span class="tray-thumb-none">◈</span>';
    const isFav = trayTab === 'favs';
    return `<div class="tray-item${isFav ? ' fav' : ''}" onclick="openTrayItem(${i})">
      <div class="tray-thumb">${thumb}</div>
      <div class="tray-item-title">${esc(r.title || '')}</div>
    </div>`;
  }).join('');
}

function openTrayItem(i) {
  const items = trayTab === 'history' ? history : favorites;
  const r = items[i];
  if (!r) return;
  toggleTray();
  // Re-render the result
  render(r);
}

function exportFavs() {
  if (!favorites.length) return;
  const rows = [['Artist','Title','Year','Genre','Country','Source','URL','Note']];
  favorites.forEach(r => rows.push([
    r.artist||'', r.title||'', r.year||'', r.genre||'',
    r.country||'', r.source||'', r.url||'', favNotes[favId(r)]||''
  ]));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'blind-spin-favorites.csv';
  a.click();
}

// ── Last.fm: pick a random album ─────────────────────────────────────────────
async function lfmViaProxy(f={}) {
  const MAX_TRIES = 5;
  for (let attempt = 0; attempt < MAX_TRIES; attempt++) {
    log(`[lfm] attempt ${attempt+1}`, 'dim');
    let data;
    try {
      const params = new URLSearchParams();
      if (f.genre) params.set('genre', f.genre);
      const qs = params.toString() ? '?' + params.toString() : '';
      data = await apiFetch('/api/lfm/random' + qs, 'lfm');
    } catch(e) {
      log(`[lfm] fetch failed: ${e.message}`, 'warn');
      await sleep(400);
      continue;
    }
    if (!data.artist || !data.title) {
      log('[lfm] empty result, retrying...', 'dim');
      await sleep(300);
      continue;
    }
    log(`[lfm] tag=${data.genre}`, 'dim');
    return {
      source:  'lastfm',
      artist:  data.artist,
      title:   data.title,
      url:     data.url,
      cover:   data.cover || null,
      tags:    data.tags  || [],
      year:    data.year  || '',
      type:    'album',
      genre:   data.genre || '',
      label:   '',
      country: '',
      mbid:    null,
      secondaryTypes: [],
    };
  }
  throw new Error('could not get a Last.fm result after ' + MAX_TRIES + ' attempts');
}

// ── RECORD STORE ─────────────────────────────────────────────────────────────
const STORE_GENRES = [
  'Rock', 'Electronic', 'Jazz', 'Hip Hop',
  'Classical', 'Folk, World, & Country', 'Funk / Soul', 'Latin',
  'Blues', 'Reggae', 'Pop', 'Metal'
];
let storeLoaded = false;
let storeOpen = false;

function toggleStore() {
  const overlay = document.getElementById('store-overlay');
  storeOpen = !storeOpen;
  overlay.classList.toggle('open', storeOpen);
  const sp = document.getElementById('store-popover');
  if (sp) sp.classList.remove('vis');
  document.getElementById('storebtn').classList.toggle('on', storeOpen);
  const storeBody = document.getElementById('store-body');
  if (storeOpen && (!storeLoaded || !storeBody.children.length)) loadStore();
}

async function loadStore() {
  storeLoaded = true;
  const body = document.getElementById('store-body');
  const status = document.getElementById('store-status');
  body.innerHTML = '';

  // Build shelf skeletons immediately
  STORE_GENRES.forEach(genre => {
    const row = document.createElement('div');
    row.className = 'shelf-row';
    row.id = `shelf-${genre.replace(/[^a-z]/gi,'_')}`;
    row.innerHTML = `
      <div class="shelf-label-row">
        <span class="shelf-label">${genre}</span>
        <button class="shelf-refresh" onclick="refreshShelf('${genre}')" title="Refresh shelf">↻</button>
      </div>
      <div class="shelf-surface">
        <div class="shelf-records" id="records-${genre.replace(/[^a-z]/gi,'_')}">
          ${Array(5).fill('<div class="sleeve sleeve-loading"><div class="sleeve-inner"></div></div>').join('')}
        </div>
      </div>`;
    body.appendChild(row);
  });

  // Fetch genres sequentially to avoid hammering Discogs rate limits
  let loaded = 0;
  status.textContent = `loading ${STORE_GENRES.length} shelves...`;

  const GENRE_MAP = {
    'Metal': { genre: 'Rock', style: 'Metal' },
    'Blues': { genre: 'Blues' },
    'Reggae': { genre: 'Reggae' },
    'Pop': { genre: 'Pop' },
    'Funk / Soul': { genre: 'Funk / Soul' },
    'Folk, World, & Country': { genre: 'Folk, World, & Country' },
  };

  for (const genre of STORE_GENRES) {
    const results = [];
    const mapping = GENRE_MAP[genre] || { genre };
    await Promise.allSettled(Array(5).fill(0).map(async () => {
      try {
        const params = new URLSearchParams(mapping);
        const data = await fetch('/api/discogs/random?' + params).then(r => r.json());
        if (data.artist && data.title) results.push(data);
      } catch {}
    }));

    const container = document.getElementById('records-' + genre.replace(/[^a-z]/gi,'_'));
    if (!container) continue;
    container.innerHTML = '';
    if (!results.length) {
      container.innerHTML = '<div style="color:#4a3018;font-size:0.55rem;padding:8px 0;font-family:monospace;">no results</div>';
    } else {
      results.forEach(r => container.appendChild(makeSleeve(r)));
    }
    loaded++;
    status.textContent = `${loaded} / ${STORE_GENRES.length} loaded`;
  }

  status.textContent = 'loaded';
}

// ── SLEEVE / STORE ───────────────────────────────────────────────────────────
function makeSleeve(r) {
  const div = document.createElement('div');
  div.className = 'sleeve';

  const spineText = `${r.artist} — ${r.title}`;
  const artStyle = r.cover ? `background-image:url('${escA(r.cover)}')` : '';
  const placeholder = r.cover ? '' : '<div class="sleeve-art-placeholder"><span>◈</span></div>';
  const tagsHtml = (r.tags||[]).slice(0,4).map(t=>`<span class="sp-tag">${esc(t)}</span>`).join('');

  div.innerHTML = `
    <div class="sleeve-inner">
      <div class="sleeve-spine"><span class="sleeve-spine-text">${esc(spineText)}</span></div>
      <div class="sleeve-art" style="${artStyle}">${placeholder}</div>
      <div class="sleeve-info">
        <div class="sleeve-artist">${esc(r.artist)}</div>
        <div class="sleeve-title">${esc(r.title)}</div>
        <div class="sleeve-year">${esc(r.year || '')} ${esc(r.country || '')}</div>
      </div>
    </div>`;

  div.addEventListener('click', (e) => {
    e.stopPropagation();
    // Get or create the single store-level popover
    let pop = document.getElementById('store-popover');
    if (!pop) {
      pop = document.createElement('div');
      pop.id = 'store-popover';
      document.body.appendChild(pop);
      // Close on outside click
      document.addEventListener('click', (ev) => { if (!ev.target.closest('#store-popover') && !ev.target.closest('.sleeve')) pop.classList.remove('vis'); });
      pop.addEventListener('click', e => e.stopPropagation());
    }
    // Toggle off if same sleeve clicked again
    if (pop._sleeve === div && pop.classList.contains('vis')) {
      pop.classList.remove('vis');
      pop._sleeve = null;
      return;
    }
    pop._sleeve = div;
    // Fill content
    pop.innerHTML = `
      <div class="sp-artist">${esc(r.artist)}</div>
      <div class="sp-title">${esc(r.title)}</div>
      <div class="sp-meta">${[r.year, r.country, r.genre].filter(Boolean).map(esc).join(' · ')}</div>
      <div style="margin:6px 0">${tagsHtml}</div>
      <button class="sleeve-open-btn">Open full record ↗</button>`;
    pop.querySelector('.sleeve-open-btn').addEventListener('click', () => {
      pop.classList.remove('vis');
      toggleStore();
      openStoreRelease(r);
    });
    // Position popover: centered horizontally on sleeve, above it
    function placePopover() {
      const rect2 = div.getBoundingClientRect();
      if (rect2.right < 0 || rect2.left > window.innerWidth) {
        pop.classList.remove('vis'); pop._sleeve = null; return;
      }
      const pw = 220, ph = pop.offsetHeight || 180;
      let left = Math.round(rect2.left + rect2.width / 2 - pw / 2);
      left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
      // Position above the sleeve top edge (rect2.top is top of the sleeve div)
      let top = rect2.top - ph - 8;
      if (top < 8) top = rect2.bottom + 8;
      pop.style.left = left + 'px';
      pop.style.top = top + 'px';
    }
    pop.classList.add('vis');
    placePopover();
    // Update position on any scroll inside the store overlay
    const overlay = document.getElementById('store-scroll') || document.getElementById('store-overlay');
    if (overlay && !overlay._popScrollListener) {
      overlay._popScrollListener = true;
      overlay.addEventListener('scroll', () => {
        const p = document.getElementById('store-popover');
        if (p && p._sleeve && p.classList.contains('vis')) placePopover();
      }, { passive: true });
      // Also listen to each shelf surface scroll
      overlay.addEventListener('scroll', placePopover, { passive: true, capture: true });
    }
    const shelf = div.closest('.shelf-surface');
    if (shelf) shelf.addEventListener('scroll', placePopover, { passive: true });
  });

  sleeveObserver.observe(div);
  return div;
}

async function openStoreRelease(r) {
  if (busy) return;
  busy = true;
  const btn = document.getElementById('btn');
  btn.classList.add('ld'); btn.disabled = true;
  hideCard(); clrLog();
  log(`opening: "${r.artist}" — "${r.title}"`, 'info');
  // Brief pause for overlay close animation to feel intentional
  await sleep(120);

  // Result already has all needed fields — just render it
  const release = {
    source:   'discogs',
    artist:   r.artist,
    title:    r.title,
    url:      r.url || '',
    cover:    r.cover || null,
    tags:     r.tags || [],
    year:     r.year || '',
    type:     r.type || 'album',
    genre:    r.genre || '',
    label:    r.label || '',
    country:  r.country || '',
    catno:    r.catno || '',
    release_id: r.release_id || '',
    mbid:     null,
    secondaryTypes: [],
  };

  render(release);
  btn.classList.remove('ld'); btn.disabled = false;
  busy = false;
}

// ── POPOVER SCROLL DISMISS ───────────────────────────────────────────────────
const sleeveObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (!entry.isIntersecting) {
      const sp = document.getElementById('store-popover');
      if (sp && sp._sleeve === entry.target) { sp.classList.remove('vis'); sp._sleeve = null; }
    }
  });
}, { threshold: 0.3 });

// ── SHELF REFRESH ────────────────────────────────────────────────────────────
async function refreshShelf(genre) {
  const key = genre.replace(/[^a-z]/gi,'_');
  const container = document.getElementById('records-' + key);
  if (!container) return;
  container.innerHTML = Array(5).fill('<div class="sleeve sleeve-loading"><div class="sleeve-inner"></div></div>').join('');
  const results = [];
  const promises = Array(5).fill(0).map(async () => {
    try {
      const params = new URLSearchParams({ genre });
      const data = await fetch('/api/discogs/random?' + params).then(r => r.json());
      if (data.artist && data.title) results.push(data);
    } catch {}
  });
  await Promise.allSettled(promises);
  container.innerHTML = '';
  if (!results.length) {
    container.innerHTML = '<div style="color:#4a3018;font-size:0.55rem;padding:8px 0;font-family:monospace;">no results</div>';
  } else {
    results.forEach(r => container.appendChild(makeSleeve(r)));
  }
}

// ── TAG COLORS ───────────────────────────────────────────────────────────────────
// Hash-based tag color — every tag gets a consistent color from its string
// No need to maintain a list — any tag gets a deterministic hue + texture
const TAG_COLOR_CLASSES = ['rust','rose','teal','slate','olive','ochre','forest','plum'];
function tagColor(tag) {
  let hash = 0;
  for (let i = 0; i < tag.length; i++) hash = (hash * 31 + tag.charCodeAt(i)) >>> 0;
  return TAG_COLOR_CLASSES[hash % TAG_COLOR_CLASSES.length];
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function tryJSON(s) {
  if (!s) return null;
  s = s.replace(/```json\s*/gi,'').replace(/```\s*/gi,'').trim();
  const a=s.indexOf('{'), b=s.lastIndexOf('}');
  if (a<0||b<0) return null;
  try { return JSON.parse(s.slice(a,b+1)); } catch { return null; }
}
function pill(t, cls='') { return `<span class="pill ${cls}">${esc(t)}</span>`; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

function showCard() {
  document.getElementById('empty').style.display='none';
  const c=document.getElementById('card');
  c.classList.remove('on'); void c.offsetWidth; c.classList.add('on');
}
function hideCard() {
  document.getElementById('empty').style.display='flex';
  document.getElementById('card').classList.remove('on');
  document.getElementById('simbtn').classList.remove('vis');
  // Lift turntable arm
  const arm = document.getElementById('turntable-arm');
  if (arm) arm.classList.remove('playing');
}
