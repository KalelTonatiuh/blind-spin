<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blind Spin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap');

  :root {
    --bg: #0c0c0a; --surface: #131310; --surface2: #181814;
    --border: #252520; --border2: #2e2e28;
    --muted: #484840; --text: #e2dfd6; --sub: #7a7870;
    --accent: #bfa96a; --accent-dim: #8c7d4e;
    --green: #6a9e6a; --red: #9e6a6a; --amber: #b89040; --link: #7a9ab5;
    --cbg: #070707; --cok: #4a8a4a; --cerr: #9e5a5a; --cinfo: #4a6a9e; --cwarn: #9e8040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; height: 100%; }

  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.5;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }

  /* ── LAYOUT ── */
  .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  .hdr {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 14px;
    padding: 11px 18px; border-bottom: 1px solid var(--border);
  }
  .wm { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.5rem; color: var(--accent); line-height: 1; flex-shrink: 0; }
  .hdr-sub { font-size: 0.56rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .spin-btn {
    flex-shrink: 0; background: none; border: 1px solid var(--accent); color: var(--accent);
    font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 7px 18px; cursor: pointer;
    transition: background 0.1s, color 0.1s; display: flex; align-items: center; gap: 7px;
  }
  .spin-btn:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
  .spin-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .sp { width: 9px; height: 9px; border: 1.5px solid currentColor; border-top-color: transparent; border-radius: 50%; display: none; animation: rot 0.65s linear infinite; }
  .spin-btn.ld .sp { display: block; }
  @keyframes rot { to { transform: rotate(360deg); } }

  /* ── CONSOLE ── */
  .con { display: flex; flex-direction: column; background: var(--cbg); overflow: hidden; }
  .con-hdr { flex-shrink: 0; display: flex; align-items: center; gap: 7px; padding: 8px 12px; border-bottom: 1px solid #111; }
  .cdot { width: 5px; height: 5px; border-radius: 50%; background: #1c1c1c; flex-shrink: 0; transition: background 0.2s; }
  .cdot.on { background: var(--cok); }
  .cdot.er { background: var(--cerr); }
  .con-title { font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: #222; flex: 1; }
  .con-clr { font-size: 0.56rem; color: #222; background: none; border: none; cursor: pointer; font-family: inherit; letter-spacing: 0.1em; text-transform: uppercase; }
  .con-clr:hover { color: #555; }
  #log { flex: 1; overflow-y: auto; padding: 7px 11px 10px; font-size: 0.6rem; line-height: 1.6; scrollbar-width: thin; scrollbar-color: #111 transparent; }
  .ll { display: flex; gap: 7px; }
  .lt { color: #1e1e1e; flex-shrink: 0; font-size: 0.57rem; min-width: 46px; }
  .lm { flex: 1; word-break: break-all; }
  .ll.ok   .lm { color: var(--cok); }
  .ll.info .lm { color: var(--cinfo); }
  .ll.warn .lm { color: var(--cwarn); }
  .ll.err  .lm { color: var(--cerr); }
  .ll.dim  .lm { color: #252525; }
  .ll.raw  .lm { color: #1a2a1a; font-size: 0.52rem; }

  /* ── EMPTY ── */
  .empty { padding-top: 24px; }
  .e1 { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.07em; margin-bottom: 7px; }
  .e2 { height: 1px; background: var(--border); margin-bottom: 7px; }
  .e3 { font-size: 0.56rem; color: #202020; letter-spacing: 0.05em; }

  /* ── LAYOUT ── */
  .body { flex: 1; display: grid; grid-template-columns: 1fr 220px; overflow: hidden; }
  .main { overflow-y: auto; padding: 0; border-right: 1px solid var(--border); position: relative; }

  /* ── CARD ── */
  .card { display: none; }
  .card.on { display: flex; flex-direction: column; min-height: 100%; animation: fu 0.3s ease; }
  @keyframes fu { from { opacity:0; } to { opacity:1; } }

  /* Blurred cover wash fills the top section */
  .cbg {
    position: relative; overflow: hidden;
    padding: 36px 32px 28px; display: flex; gap: 28px; align-items: flex-end;
    min-height: 260px;
  }
  .cbg-wash {
    position: absolute; inset: -20px; background-size: cover; background-position: center;
    filter: blur(28px) brightness(0.28) saturate(1.4);
    transform: scale(1.1);
  }
  .cbg-vignette {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(12,12,10,0.1) 0%, rgba(12,12,10,0.7) 100%);
  }
  .cov {
    position: relative; z-index: 1;
    width: 160px; height: 160px; flex-shrink: 0;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    background: var(--surface); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .cov img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cnone { font-size: 0.5rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; text-align: center; padding: 10px; line-height: 1.6; }

  .cmeta { position: relative; z-index: 1; flex: 1; min-width: 0; padding-bottom: 4px; }
  .csrc { font-size: 0.5rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent-dim); margin-bottom: 6px; }
  .cart { font-size: 0.72rem; color: var(--sub); letter-spacing: 0.05em; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ctit { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 3rem; line-height: 1.05; color: var(--text); margin-bottom: 14px; word-break: break-word; }
  .cpills { display: flex; flex-wrap: wrap; gap: 5px; }
  .pill { font-size: 0.54rem; padding: 3px 8px; border: 1px solid rgba(255,255,255,0.12); color: rgba(226,223,214,0.55); letter-spacing: 0.06em; }
  .pill.hi { border-color: var(--accent-dim); color: var(--accent); }

  /* Content below the wash */
  .cbot { padding: 22px 32px 28px; flex: 1; }

  .sec { margin-bottom: 20px; }
  .sec:last-child { margin-bottom: 0; }
  .slbl { font-size: 0.5rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .slbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .grow, .drow { display: flex; flex-wrap: wrap; gap: 5px; }
  .gt { font-size: 0.6rem; padding: 3px 8px; border: 1px solid var(--border2); color: var(--sub); letter-spacing: 0.04em; }
  .gt.p { border-color: var(--accent-dim); color: var(--accent); }
  .dt { font-size: 0.57rem; color: var(--muted); letter-spacing: 0.02em; }
  .dt::before { content: '·'; margin-right: 4px; }

  .srow { display: flex; gap: 9px; flex-wrap: wrap; }
  .sb { border: 1px solid var(--border); padding: 8px 10px; background: var(--surface2); min-width: 70px; }
  .sv { font-size: 0.9rem; color: var(--text); display: block; margin-bottom: 1px; }
  .sv.g { color: var(--green); } .sv.m { color: var(--amber); } .sv.b { color: var(--red); }
  .sl { font-size: 0.54rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; display: block; }

  .tlist { border: 1px solid var(--border); }
  .tr { display: flex; gap: 8px; align-items: baseline; padding: 4px 8px; border-bottom: 1px solid var(--border); font-size: 0.63rem; }
  .tr:last-child { border-bottom: none; }
  .tn { color: var(--muted); min-width: 15px; text-align: right; flex-shrink: 0; }
  .tt { flex: 1; color: var(--sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td { color: var(--muted); font-size: 0.58rem; flex-shrink: 0; }

  .lrow { display: flex; gap: 14px; flex-wrap: wrap; padding-top: 0; }
  .el { font-size: 0.6rem; color: var(--link); text-decoration: none; letter-spacing: 0.05em; border-bottom: 1px solid transparent; transition: border-color 0.1s; }
  .el:hover { border-color: var(--link); }

  .note { font-size: 0.58rem; color: var(--muted); margin-top: 14px; padding: 8px 10px; border: 1px dashed var(--border); line-height: 1.6; }


  /* ── FILTER PANEL ── */
  .fbar {
    flex-shrink: 0; border-bottom: 1px solid var(--border);
    overflow: hidden; transition: max-height 0.2s ease;
    max-height: 0;
  }
  .fbar.open { max-height: 160px; }
  .fbar-inner { padding: 10px 18px 12px; display: flex; flex-wrap: wrap; gap: 10px 18px; align-items: flex-end; }

  .fg { display: flex; flex-direction: column; gap: 4px; }
  .flbl { font-size: 0.52rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
  .finp, .fsel {
    background: var(--surface); border: 1px solid var(--border2); color: var(--text);
    font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem;
    padding: 4px 7px; outline: none; min-width: 80px;
  }
  .finp:focus, .fsel:focus { border-color: var(--accent-dim); }
  .finp::placeholder { color: var(--muted); }
  .fsel option { background: var(--surface2); }
  .fyear { display: flex; gap: 5px; align-items: center; }
  .fyear span { font-size: 0.56rem; color: var(--muted); }
  .fyear .finp { width: 54px; }

  .fbar-reset {
    font-size: 0.56rem; color: var(--muted); background: none; border: none;
    cursor: pointer; font-family: inherit; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 4px 0; align-self: flex-end;
  }
  .fbar-reset:hover { color: var(--text); }

  .filter-btn {
    flex-shrink: 0; background: none; border: 1px solid var(--border2); color: var(--muted);
    font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 7px 12px; cursor: pointer;
    transition: border-color 0.1s, color 0.1s;
  }
  .filter-btn:hover, .filter-btn.on { border-color: var(--accent-dim); color: var(--accent-dim); }

  .sim-btn {
    display: none; background: none; border: 1px solid var(--border2); color: var(--muted);
    font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 5px 12px; cursor: pointer;
    transition: border-color 0.1s, color 0.1s; margin-top: 14px;
  }
  .sim-btn:hover { border-color: var(--accent-dim); color: var(--accent-dim); }
  .sim-btn.vis { display: inline-block; }

  /* ── INFO PANEL ── */
  .blurb {
    font-size: 0.65rem; color: var(--sub); line-height: 1.75;
    margin-bottom: 18px; padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .blurb-src { font-size: 0.5rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 6px; }

  .info-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
  .info-item { display: flex; flex-direction: column; gap: 3px; }
  .info-lbl { font-size: 0.48rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
  .info-val { font-size: 0.65rem; color: var(--text); }

  @media (max-width: 680px) {
    .fbar.open { max-height: 260px; }
    .fbar-inner { gap: 8px 14px; }
  }
  /* mobile */
  @media (max-width: 680px) {
    .body { grid-template-columns: 1fr; grid-template-rows: 1fr 210px; }
    .main { border-right: none; border-bottom: 1px solid var(--border); }
    .hdr-sub { display: none; }
  }

  /* ── RECORD STORE OVERLAY ── */
  .store-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: #1a1208;
    overflow-y: auto;
    flex-direction: column;
  }
  .store-overlay.open { display: flex; }

  .store-hdr {
    flex-shrink: 0; display: flex; align-items: center; gap: 16px;
    padding: 14px 28px; border-bottom: 2px solid #3d2a0e;
    background: linear-gradient(to bottom, #2a1c08, #1a1208);
    position: sticky; top: 0; z-index: 10;
  }
  .store-title {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1.4rem; color: #c8a96e; flex: 1;
  }
  .store-close {
    background: none; border: 1px solid #5a3e1a; color: #8a6a3a;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.12em; text-transform: uppercase; padding: 6px 14px; cursor: pointer;
    transition: all 0.15s;
  }
  .store-close:hover { border-color: #c8a96e; color: #c8a96e; }
  .store-status { font-size: 0.54rem; color: #6a5030; letter-spacing: 0.1em; }

  .store-body { padding: 0 0 40px; }

  /* Shelf row */
  .shelf-row { margin-bottom: 0; position: relative; }

  .shelf-label {
    font-size: 0.52rem; letter-spacing: 0.28em; text-transform: uppercase;
    color: #7a5c30; padding: 22px 28px 10px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* The actual wooden shelf surface */
  .shelf-surface {
    position: relative;
    background: linear-gradient(to bottom,
      #3d2710 0%, #4a3018 40%, #3a2510 60%, #2e1e0c 100%);
    border-top: 3px solid #6a4820;
    border-bottom: 4px solid #1a0f05;
    padding: 18px 28px 22px;
    box-shadow:
      inset 0 2px 4px rgba(255,200,100,0.06),
      inset 0 -2px 6px rgba(0,0,0,0.4),
      0 4px 12px rgba(0,0,0,0.6);
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: #4a3018 #2a1a08;
  }
  /* Wood grain lines */
  .shelf-surface::before {
    content: '';
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 60px,
      rgba(0,0,0,0.04) 60px,
      rgba(0,0,0,0.04) 61px,
      transparent 61px,
      transparent 130px,
      rgba(255,180,80,0.03) 130px,
      rgba(255,180,80,0.03) 131px
    );
    pointer-events: none;
  }

  .shelf-records {
    display: flex; gap: 10px; align-items: flex-end;
    min-width: max-content;
  }

  /* Individual record sleeve */
  .sleeve {
    width: 240px; height: 240px; flex-shrink: 0;
    position: relative; cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    transform-origin: bottom center;
  }
  .sleeve:hover { transform: translateY(-12px) rotate(-1.5deg); }
  .sleeve:hover .sleeve-info { opacity: 1; }

  /* The sleeve itself — cardboard edge effect */
  .sleeve-inner {
    width: 100%; height: 100%; position: relative;
    box-shadow:
      2px 0 0 #1a0f05,
      4px 2px 0 #0d0805,
      -1px 0 4px rgba(0,0,0,0.5),
      0 4px 16px rgba(0,0,0,0.7);
  }

  /* Spine strip on left edge */
  .sleeve-spine {
    position: absolute; left: 0; top: 0; bottom: 0; width: 14px; z-index: 2;
    background: linear-gradient(to right, #1a1208, #2a1e10);
    border-right: 1px solid rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
  }
  .sleeve-spine-text {
    writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg);
    font-size: 0.45rem; color: rgba(200,169,110,0.5); letter-spacing: 0.1em;
    overflow: hidden; max-height: 200px; text-overflow: ellipsis; white-space: nowrap;
    font-family: 'IBM Plex Mono', monospace;
  }

  .sleeve-art {
    position: absolute; inset: 0; left: 14px;
    background: #1a1208 center/cover no-repeat;
  }
  .sleeve-art-placeholder {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #1e140a 0%, #2a1e10 50%, #1a1208 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .sleeve-art-placeholder span {
    font-size: 2rem; opacity: 0.15; user-select: none;
  }

  /* Hover info card */
  .sleeve-info {
    position: absolute; bottom: 0; left: 14px; right: 0; z-index: 3;
    background: linear-gradient(to top, rgba(10,6,2,0.95) 0%, rgba(10,6,2,0.7) 60%, transparent 100%);
    padding: 28px 10px 10px;
    opacity: 0; transition: opacity 0.2s ease;
  }
  .sleeve-artist {
    font-size: 0.54rem; color: #c8a96e; letter-spacing: 0.06em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    margin-bottom: 2px; font-family: 'IBM Plex Mono', monospace;
  }
  .sleeve-title {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1rem; color: #e2dfd6; line-height: 1.2;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .sleeve-year { font-size: 0.48rem; color: #6a5030; margin-top: 3px; font-family: 'IBM Plex Mono', monospace; }

  /* Loading skeleton sleeve */
  .sleeve-loading .sleeve-inner {
    background: linear-gradient(90deg, #1e140a 25%, #2a1e10 50%, #1e140a 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="wm">Blind Spin</div>
    <button class="filter-btn" id="storebtn" onclick="toggleStore()">Browse</button>
    <button class="filter-btn" id="filterbtn" onclick="toggleFilters()">Filters</button>
    <button class="spin-btn" id="btn" onclick="spin()">
      <span class="sp"></span><span>Spin</span>
    </button>
  </div>

  <div class="fbar" id="fbar">
    <div class="fbar-inner">
      <div class="fg">
        <label class="flbl">source</label>
        <select class="fsel" id="f-source">
          <option value="">both</option>
          <option value="discogs">discogs</option>
          <option value="mb">musicbrainz</option>
          <option value="archive">internet archive</option>
        </select>
      </div>
      <div class="fg">
        <label class="flbl">genre</label>
        <select class="fsel" id="f-genre">
          <option value="">any</option>
          <option>Rock</option><option>Electronic</option><option>Jazz</option>
          <option>Classical</option><option>Hip Hop</option><option>Folk, World, & Country</option>
          <option>Funk / Soul</option><option>Latin</option><option>Reggae</option>
          <option>Pop</option><option>Blues</option><option>Stage & Screen</option>
          <option>Children's</option><option>Non-Music</option>
        </select>
      </div>
      <div class="fg">
        <label class="flbl">year</label>
        <div class="fyear">
          <input class="finp" id="f-year-from" type="number" placeholder="from" min="1900" max="2025">
          <span>–</span>
          <input class="finp" id="f-year-to" type="number" placeholder="to" min="1900" max="2025">
        </div>
      </div>
      <div class="fg">
        <label class="flbl">country</label>
        <input class="finp" id="f-country" type="text" placeholder="e.g. US, UK, DE" style="width:90px">
      </div>
      <div class="fg">
        <label class="flbl">format</label>
        <select class="fsel" id="f-format">
          <option value="">any</option>
          <option value="Vinyl">Vinyl</option>
          <option value="CD">CD</option>
          <option value="Cassette">Cassette</option>
          <option value="Album">LP</option>
          <option value="EP">EP</option>
          <option value="Digital">Digital</option>
        </select>
      </div>
      <button class="fbar-reset" onclick="resetFilters()">reset</button>
    </div>
  </div>

  <div class="body">
    <div class="main">
      <div class="empty" id="empty" style="padding: 28px 32px;">
        <div class="e1">press spin to pull a random release</div>
        <div class="e2"></div>
        <div class="e3">sources: musicbrainz · discogs · internet archive · random offset, no weighting</div>
        <div class="e3" style="margin-top:4px">strategy: coin-flip between sources each spin · no cultural weighting</div>
      </div>

      <div class="card" id="card">
        <div class="cbg">
          <div class="cbg-wash" id="cbg-wash"></div>
          <div class="cbg-vignette"></div>
          <div class="cov" id="cov"><div class="cnone">no art</div></div>
          <div class="cmeta">
            <div class="csrc" id="csrc"></div>
            <div class="cart" id="cart"></div>
            <div class="ctit" id="ctit"></div>
            <div class="cpills" id="cpills"></div>
          </div>
        </div>
        <div class="cbot">
          <div class="sec" id="ssec" style="display:none"><div class="slbl">stats</div><div class="srow" id="srow"></div></div>
          <div class="sec" id="gsec" style="display:none"><div class="slbl">genres / tags</div><div class="grow" id="grow"></div></div>
          <div class="sec" id="dsec" style="display:none"><div class="slbl">tracklist</div><div class="tlist" id="tlist"></div></div>
          <div id="infosec" style="display:none">
            <div id="blurbsec" style="display:none">
              <div class="blurb" id="blurb-text"></div>
            </div>
            <div id="inforow" class="info-row" style="display:none"></div>
            <div class="sec" id="dsec2" style="display:none">
              <div class="slbl">tracklist</div>
              <div class="tlist" id="tlist2"></div>
            </div>
          </div>
          <div class="lrow" id="lrow"></div>
          <button class="sim-btn" id="simbtn" onclick="spinSimilar()">Similar ↻</button>
          <div class="note" id="note" style="display:none"></div>
        </div>
      </div>
    </div>

    <div class="con">
      <div class="con-hdr">
        <div class="cdot" id="cdot"></div>
        <div class="con-title">debug console</div>
        <button class="con-clr" onclick="clrLog()">clear</button>
      </div>
      <div id="log"></div>
    </div>
  </div>

  <!-- ── RECORD STORE OVERLAY ── -->
  <div class="store-overlay" id="store-overlay">
    <div class="store-hdr">
      <div class="store-title">Record Store</div>
      <span class="store-status" id="store-status"></span>
      <button class="store-close" onclick="toggleStore()">✕ Close</button>
    </div>
    <div class="store-body" id="store-body"></div>
  </div>
</div>

<script>
// ── LOG ───────────────────────────────────────────────────────────────────────
const logEl = document.getElementById('log');
const cdot  = document.getElementById('cdot');
function ts() { const d=new Date(); return `${h2(d.getHours())}:${h2(d.getMinutes())}:${h2(d.getSeconds())}`; }
function h2(n) { return String(n).padStart(2,'0'); }
function log(msg, t='ok') {
  const d=document.createElement('div'); d.className=`ll ${t}`;
  d.innerHTML=`<span class="lt">${ts()}</span><span class="lm">${esc(String(msg))}</span>`;
  logEl.appendChild(d); logEl.scrollTop=logEl.scrollHeight;
  if(t==='err') cdot.className='cdot er';
  else if(!cdot.classList.contains('er')) cdot.className='cdot on';
}
function clrLog() { logEl.innerHTML=''; cdot.className='cdot'; }

// ── NOTE: constants defined below in mbViaProxy section ─────────────────────────────────────────────────────────────────────

// ── FILTERS ──────────────────────────────────────────────────────────────────
function getFilters() {
  return {
    source:    document.getElementById('f-source').value,
    genre:     document.getElementById('f-genre').value,
    yearFrom:  document.getElementById('f-year-from').value,
    yearTo:    document.getElementById('f-year-to').value,
    country:   document.getElementById('f-country').value.trim().toUpperCase(),
    format:    document.getElementById('f-format').value,
  };
}
function toggleFilters() {
  const fb = document.getElementById('fbar');
  const btn = document.getElementById('filterbtn');
  const open = fb.classList.toggle('open');
  btn.classList.toggle('on', open);
}
function resetFilters() {
  ['f-source','f-genre','f-format'].forEach(id => document.getElementById(id).value = '');
  ['f-year-from','f-year-to','f-country'].forEach(id => document.getElementById(id).value = '');
}

// ── SPIN ─────────────────────────────────────────────────────────────────────
let busy = false;
async function spin() {
  if (busy) return;
  busy = true;
  const btn = document.getElementById('btn');
  btn.classList.add('ld'); btn.disabled = true;
  hideCard(); clrLog();

  log('spin started', 'info');
  const f = getFilters();
  if (Object.values(f).some(v => v)) log(`filters: ${JSON.stringify(f)}`, 'dim');

  try {
    // Determine source from filter or weighted random (MB 30%, Discogs 40%, IA 30%)
    let source;
    if (f.source === 'discogs') source = 'discogs';
    else if (f.source === 'mb') source = 'mb';
    else if (f.source === 'archive') source = 'archive';
    else { const r = Math.random(); source = r < 0.3 ? 'mb' : r < 0.7 ? 'discogs' : 'archive'; }

    log(`source: ${source}`, 'info');

    let rg;
    if (source === 'discogs') {
      rg = await discogsViaProxy(f);
      log(`got: "${rg.artist}" — "${rg.title}" [${rg.genre}] ${rg.year}`, 'ok');
      log(rg.cover ? 'cover included' : 'no cover', rg.cover ? 'ok' : 'dim');
    } else if (source === 'archive') {
      rg = await iaViaProxy(f);
      log(`got: "${rg.artist}" — "${rg.title}" [${rg.collection}] ${rg.year}`, 'ok');
      log(rg.cover ? 'cover included' : 'no cover', rg.cover ? 'ok' : 'dim');
    } else {
      try {
        rg = await mbViaProxy(f);
      } catch(mbErr) {
        if (f.source === 'mb') throw mbErr;
        log(`[mb] all attempts failed, falling back to discogs`, 'warn');
        rg = await discogsViaProxy(f);
        log(`got: "${rg.artist}" — "${rg.title}" [${rg.genre}] ${rg.year}`, 'ok');
        log(rg.cover ? 'cover included' : 'no cover', rg.cover ? 'ok' : 'dim');
        render(rg);
        btn.classList.remove('ld'); btn.disabled = false; busy = false;
        return;
      }
      log(`got: "${rg.artist}" — "${rg.title}" [${rg.type}] ${rg.year}`, 'ok');

      log('fetching tags...', 'dim');
      rg.tags = await fetchTags(rg.mbid);

      log('fetching cover...', 'dim');
      rg.cover = await fetchCoverUrl(rg.mbid, rg.artist, rg.title);
      log(rg.cover ? 'cover found' : 'no cover', rg.cover ? 'ok' : 'dim');
    }

    render(rg);
  } catch(e) {
    log(`FATAL: ${e.message}`, 'err');
  }

  btn.classList.remove('ld'); btn.disabled = false;
  busy = false;
}

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const MB_TOTAL = 2800000;
const BAD_TYPES  = new Set(['bootleg','promotional','interview','spokenword','audiobook','audio drama','other','dj-mix','mixtape/street','single','broadcast']);
const GOOD_TYPES = new Set(['album','ep']);

// ── FETCH via local Flask proxy ───────────────────────────────────────────────
async function apiFetch(url, logLabel) {
  log(`[${logLabel}] GET ${url}`, 'dim');
  const resp = await fetch(url);
  if (!resp.ok) {
    let detail = "";
    try { const j = await resp.json(); detail = " — " + JSON.stringify(j); } catch {}
    throw new Error(`HTTP ${resp.status}` + detail);
  }
  return resp.json();
}

// ── MB: pick a random release-group ──────────────────────────────────────────
async function mbViaProxy(f={}) {
  const MAX_TRIES = 8;
  for (let attempt = 0; attempt < MAX_TRIES; attempt++) {
    const offset = Math.floor(Math.random() * MB_TOTAL);
    log(`[mb] attempt ${attempt+1}, offset=${offset}`, 'dim');

    let data;
    try {
      data = await apiFetch(`/api/mb/release-groups?offset=${offset}`, 'mb');
    } catch(e) {
      log(`[mb] fetch failed: ${e.message}`, 'warn');
      await sleep(800);
      continue;
    }

    const groups = data['release-groups'] || [];
    log(`[mb] parsed ${groups.length} groups`, 'dim');
    const rg = pickGroup(groups, f);
    if (rg) { log(`[mb] picked: "${rg.artist}" — "${rg.title}"`, 'ok'); return rg; }
    log(`[mb] all filtered, retrying...`, 'dim');
    await sleep(600);
  }
  throw new Error('could not find a suitable release-group after ' + MAX_TRIES + ' attempts');
}

// ── Discogs: pick a random release ───────────────────────────────────────────
async function discogsViaProxy(f={}) {
  const MAX_TRIES = 5;
  for (let attempt = 0; attempt < MAX_TRIES; attempt++) {
    log(`[dg] attempt ${attempt+1}`, 'dim');
    let data;
    try {
      const params = new URLSearchParams();
      if (f.genre)    params.set('genre', f.genre);
      if (f.yearFrom) params.set('year_from', f.yearFrom);
      if (f.yearTo)   params.set('year_to', f.yearTo);
      if (f.country)  params.set('country', f.country);
      if (f.format)   params.set('format', f.format);
      const qs = params.toString() ? '?' + params.toString() : '';
      data = await apiFetch('/api/discogs/random' + qs, 'dg');
    } catch(e) {
      log(`[dg] fetch failed: ${e.message}`, 'warn');
      await sleep(400);
      continue;
    }
    if (!data.artist || !data.title) {
      log('[dg] empty result, retrying...', 'dim');
      await sleep(300);
      continue;
    }
    log(`[dg] genre=${data.genre} label=${data.label||'?'}`, 'dim');
    return {
      source:    'discogs',
      artist:    data.artist,
      title:     data.title,
      url:       data.url,
      cover:     data.cover || null,
      tags:      data.tags  || [],
      year:      data.year  || '',
      type:      data.type  || 'album',
      genre:     data.genre || '',
      label:     data.label || '',
      country:   data.country || '',
      mbid:      null,
      secondaryTypes: [],
    };
  }
  throw new Error('could not get a Discogs result after ' + MAX_TRIES + ' attempts');
}

// ── IA: pick a random release from Internet Archive ─────────────────────────
async function iaViaProxy(f={}) {
  const MAX_TRIES = 5;
  for (let attempt = 0; attempt < MAX_TRIES; attempt++) {
    log(`[ia] attempt ${attempt+1}`, 'dim');
    let data;
    try {
      const params = new URLSearchParams();
      if (f.yearFrom) params.set('year_from', f.yearFrom);
      if (f.yearTo)   params.set('year_to', f.yearTo);
      if (f.genre)    params.set('genre', f.genre);
      const qs = params.toString() ? '?' + params.toString() : '';
      data = await apiFetch('/api/ia/random' + qs, 'ia');
    } catch(e) {
      log(`[ia] fetch failed: ${e.message}`, 'warn');
      await sleep(400);
      continue;
    }
    if (!data.title) {
      log('[ia] empty result, retrying...', 'dim');
      await sleep(300);
      continue;
    }
    log(`[ia] collection=${data.collection}`, 'dim');
    return {
      source:     'archive',
      artist:     data.artist || 'Unknown',
      title:      data.title,
      url:        data.url,
      cover:      data.cover || null,
      tags:       data.tags  || [],
      year:       data.year  || '',
      type:       'album',
      genre:      data.genre || '',
      collection: data.collection || '',
      mbid:       null,
      secondaryTypes: [],
      country: '',
      label: '',
    };
  }
  throw new Error('could not get an Internet Archive result after ' + MAX_TRIES + ' attempts');
}

// ── Tags ──────────────────────────────────────────────────────────────────────
async function fetchTags(mbid) {
  try {
    const data = await apiFetch(`/api/mb/release-group/${mbid}?inc=tags+genres`, 'tags');
    const tags   = (data.tags   || []).map(t => ({ name: t.name, count: t.count || 0 }));
    const genres = (data.genres || []).map(g => ({ name: g.name, count: g.count || 0 }));
    const seen = new Set();
    const merged = [...genres, ...tags].filter(t => {
      if (seen.has(t.name)) return false;
      seen.add(t.name); return true;
    });
    merged.sort((a,b) => b.count - a.count);
    const names = merged.slice(0,10).map(t=>t.name).filter(Boolean);
    log(`[tags] ${names.length} tags: ${names.join(', ')||'none'}`, names.length ? 'ok' : 'dim');
    return names;
  } catch(e) {
    log(`[tags] err: ${e.message}`, 'warn');
    return [];
  }
}

// ── Cover art ─────────────────────────────────────────────────────────────────
async function fetchCoverUrl(mbid, artist, title) {
  // Try CAA first — fetch directly, don't throw on 404
  try {
    const resp = await fetch(`/api/caa/release-group/${mbid}`);
    const data = await resp.json();
    const front = (data.images||[]).find(i => i.front);
    if (front) {
      const url = front.thumbnails?.['250'] || front.thumbnails?.small || front.image;
      if (url) { log(`[cover] caa ok`, 'ok'); return url; }
    }
    log('[cover] caa: no front image', 'dim');
  } catch(e) {
    log(`[cover] caa failed: ${e.message}`, 'dim');
  }
  // Fallback: Discogs image search
  log('[cover] trying discogs fallback...', 'dim');
  try {
    const q = encodeURIComponent(artist) + '&title=' + encodeURIComponent(title);
    const data = await apiFetch(`/api/discogs/cover?artist=${q}`, 'cover');
    if (data.cover) { log('[cover] discogs fallback ok', 'ok'); return data.cover; }
  } catch(e) {
    log(`[cover] discogs fallback failed: ${e.message}`, 'dim');
  }
  return null;
}

// ── Pick group ────────────────────────────────────────────────────────────────
function pickGroup(groups, f={}) {
  const shuffled = [...groups].sort(() => Math.random() - 0.5);
  const yFrom = f.yearFrom ? parseInt(f.yearFrom) : 1930;
  const yTo   = f.yearTo   ? parseInt(f.yearTo)   : 9999;
  for (const g of shuffled) {
    const pt = (g['primary-type']||'').toLowerCase();
    const st = (g['secondary-types']||[]).map(s=>s.toLowerCase());
    if (!GOOD_TYPES.has(pt)) continue;
    if ([pt,...st].some(t => BAD_TYPES.has(t))) continue;
    // Format filter for MB: map EP/LP
    if (f.format === 'EP' && pt !== 'ep') continue;
    if (f.format === 'Album' && pt !== 'album') continue;
    const year = parseInt((g['first-release-date']||'').slice(0,4));
    if (year > 0 && (year < yFrom || year > yTo)) continue;
    const credits = g['artist-credit']||[];
    const artist = credits.map(c => typeof c === 'string' ? c : (c.artist?.name||'')).join('').trim();
    if (!artist || !g.title) continue;
    return {
      mbid:   g.id,
      artist,
      title:  g.title,
      type:   g['primary-type'] || '',
      year:   (g['first-release-date']||'').slice(0,4),
      tags:   (g.tags||[]).map(t=>t.name).filter(Boolean),
      secondaryTypes: g['secondary-types']||[],
      country: '',
      label: '',
    };
  }
  return null;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(r) {
  // Cover
  const covEl = document.getElementById('cov');
  if (r.cover) {
    covEl.innerHTML = `<img src="${escA(r.cover)}" alt="cover" onerror="this.parentElement.innerHTML='<div class=\\'cnone\\'>no art</div>'">`;
  } else {
    covEl.innerHTML = '<div class="cnone">no art</div>';
  }

  const srcLabels = { discogs: 'discogs.com', mb: 'musicbrainz.org', archive: 'archive.org' };
  document.getElementById('csrc').textContent = srcLabels[r.source] || r.source;
  document.getElementById('cart').textContent = r.artist;
  document.getElementById('ctit').textContent = r.title;

  // Pills
  const pills = document.getElementById('cpills');
  pills.innerHTML = '';
  if (r.year)    pills.innerHTML += pill(r.year);
  if (r.type && r.source !== 'archive') pills.innerHTML += pill(r.type, 'hi');
  if (r.source === 'discogs') {
    if (r.genre)    pills.innerHTML += pill(r.genre);
    if (r.country)  pills.innerHTML += pill(r.country);
  } else if (r.source === 'archive') {
    if (r.collection) pills.innerHTML += pill(r.collection.replace(/_/g, ' '));
  } else {
    if (r.country) pills.innerHTML += pill(r.country);
    for (const st of (r.secondaryTypes||[]).slice(0,2)) pills.innerHTML += pill(st);
  }

  // Stats — just MB link count for now
  document.getElementById('ssec').style.display = 'none';

  // Tags/genres
  const gsec = document.getElementById('gsec');
  const grow = document.getElementById('grow');
  const tags = (r.tags||[]).slice(0, 12);
  if (tags.length) {
    grow.innerHTML = tags.map((t,i) => `<span class="gt${i===0?' p':''}">${esc(t)}</span>`).join('');
    gsec.style.display = 'block';
  } else { gsec.style.display = 'none'; }

  // No tracklist from release-group endpoint (would need extra call)
  document.getElementById('dsec').style.display = 'none';

  // Links
  const lrow = document.getElementById('lrow');
  const rymQ   = encodeURIComponent(r.artist + ' ' + r.title);
  const rymUrl = `https://rateyourmusic.com/search?searchterm=${rymQ}&searchtype=l`;
  const ytUrl  = `https://www.youtube.com/results?search_query=${encodeURIComponent(r.artist+' '+r.title+' full album')}`;

  let sourceLink = '';
  if (r.source === 'discogs' && r.url) {
    sourceLink = `<a class="el" href="${escA(r.url)}" target="_blank" rel="noopener">Discogs ↗</a>`;
  } else if (r.source === 'archive' && r.url) {
    sourceLink = `<a class="el" href="${escA(r.url)}" target="_blank" rel="noopener">Archive.org ↗</a>`;
  } else if (r.mbid) {
    const mbUrl = `https://musicbrainz.org/release-group/${r.mbid}`;
    sourceLink = `<a class="el" href="${escA(mbUrl)}" target="_blank" rel="noopener">MusicBrainz ↗</a>`;
  }

  lrow.innerHTML =
    sourceLink +
    `<a class="el" href="${escA(rymUrl)}" target="_blank" rel="noopener">Search RYM ↗</a>
    <a class="el" href="${escA(ytUrl)}"  target="_blank" rel="noopener">YouTube ↗</a>`;

  // Note
  const note = document.getElementById('note');
  note.style.display = 'none';

  // Store for similar button
  lastResult = r;
  document.getElementById('simbtn').classList.add('vis');

  showCard();
  log('rendered.', 'ok');

  // Fire info fetches async — don't block render
  fetchInfo(r);
}

// ── INFO PANEL ────────────────────────────────────────────────────────────────
async function fetchInfo(r) {
  // Reset info panel
  document.getElementById('infosec').style.display = 'none';
  document.getElementById('blurbsec').style.display = 'none';
  document.getElementById('inforow').style.display = 'none';
  document.getElementById('dsec2').style.display = 'none';

  const tasks = [];

  // Wikipedia blurb — all sources
  if (r.artist && r.artist !== 'Unknown') {
    tasks.push(
      fetch(`/api/wiki/artist?artist=${encodeURIComponent(r.artist)}`)
        .then(res => res.json())
        .then(data => {
          if (data.blurb) {
            document.getElementById('blurb-text').innerHTML =
              `<span>${esc(data.blurb)}</span>` +
              (data.wiki_title ? `<div class="blurb-src">via wikipedia · ${esc(data.wiki_title)}</div>` : '');
            document.getElementById('blurbsec').style.display = 'block';
            document.getElementById('infosec').style.display = 'block';
            log('[info] wiki blurb found', 'dim');
          }
        }).catch(() => {})
    );
  }

  // Label / catno / tracklist — Discogs only
  if (r.source === 'discogs' && r.release_id) {
    tasks.push(
      fetch(`/api/discogs/release/${r.release_id}`)
        .then(res => res.json())
        .then(data => {
          // Label + catno info row
          const inforow = document.getElementById('inforow');
          const items = [];
          const label = data.label || r.label || '';
          const catno = data.catno || r.catno || '';
          if (label) items.push(`<div class="info-item"><span class="info-lbl">Label</span><span class="info-val">${esc(label)}</span></div>`);
          if (catno) items.push(`<div class="info-item"><span class="info-lbl">Cat. no.</span><span class="info-val">${esc(catno)}</span></div>`);
          if (r.country) items.push(`<div class="info-item"><span class="info-lbl">Country</span><span class="info-val">${esc(r.country)}</span></div>`);
          if (items.length) {
            inforow.innerHTML = items.join('');
            inforow.style.display = 'flex';
            document.getElementById('infosec').style.display = 'block';
          }

          // Tracklist
          const tracks = data.tracklist || [];
          if (tracks.length) {
            const tlist = document.getElementById('tlist2');
            tlist.innerHTML = tracks.map(t =>
              `<div class="tr"><span class="tn">${esc(t.pos)}</span><span class="tt">${esc(t.title)}</span>${t.duration ? `<span class="td">${esc(t.duration)}</span>` : ''}</div>`
            ).join('');
            document.getElementById('dsec2').style.display = 'block';
            document.getElementById('infosec').style.display = 'block';
            log(`[info] ${tracks.length} tracks`, 'dim');
          }
        }).catch(() => {})
    );
  }

  // Label info for MB (already in response, no extra fetch needed)
  if (r.source === 'mb' || r.source === 'archive') {
    const inforow = document.getElementById('inforow');
    const items = [];
    if (r.label)   items.push(`<div class="info-item"><span class="info-lbl">Label</span><span class="info-val">${esc(r.label)}</span></div>`);
    if (r.country) items.push(`<div class="info-item"><span class="info-lbl">Country</span><span class="info-val">${esc(r.country)}</span></div>`);
    if (items.length) {
      inforow.innerHTML = items.join('');
      inforow.style.display = 'flex';
      document.getElementById('infosec').style.display = 'block';
    }
  }

  await Promise.allSettled(tasks);
}

// ── SIMILAR ──────────────────────────────────────────────────────────────────
let lastResult = null;

function spinSimilar() {
  if (!lastResult || busy) return;
  const r = lastResult;

  // Extract constraints from the last result
  const simFilters = {};

  // Genre — use first tag or genre field
  const genre = r.genre || (r.tags && r.tags[0]) || '';
  // Map to Discogs genre list if possible
  const GENRE_MAP = {
    'rock': 'Rock', 'electronic': 'Electronic', 'jazz': 'Jazz',
    'classical': 'Classical', 'hip hop': 'Hip Hop', 'hip-hop': 'Hip Hop',
    'funk': 'Funk / Soul', 'soul': 'Funk / Soul', 'latin': 'Latin',
    'reggae': 'Reggae', 'pop': 'Pop', 'blues': 'Blues',
  };
  const mappedGenre = GENRE_MAP[genre.toLowerCase()] || '';
  if (mappedGenre) simFilters.genre = mappedGenre;

  // Year — spin within ±5 years of the release
  if (r.year && parseInt(r.year) > 0) {
    const y = parseInt(r.year);
    simFilters.yearFrom = String(Math.max(1900, y - 5));
    simFilters.yearTo   = String(Math.min(2025, y + 5));
  }

  // Country — only for Discogs results where it's reliable
  if (r.source === 'discogs' && r.country) {
    simFilters.country = r.country;
  }

  // Source — stick to same source since constraints are source-specific
  simFilters.source = r.source === 'archive' ? '' : r.source;

  log(`similar: genre=${simFilters.genre||'any'} year=${simFilters.yearFrom||'?'}-${simFilters.yearTo||'?'} country=${simFilters.country||'any'}`, 'info');

  // Spin with these filters directly (bypassing the filter panel)
  spinWithFilters(simFilters);
}

async function spinWithFilters(f) {
  if (busy) return;
  busy = true;
  const btn = document.getElementById('btn');
  btn.classList.add('ld'); btn.disabled = true;
  hideCard(); clrLog();

  try {
    let source;
    if (f.source === 'discogs') source = 'discogs';
    else if (f.source === 'mb') source = 'mb';
    else if (f.source === 'archive') source = 'archive';
    else { const r = Math.random(); source = r < 0.3 ? 'mb' : r < 0.7 ? 'discogs' : 'archive'; }

    log(`source: ${source}`, 'info');
    let rg;
    if (source === 'discogs') {
      rg = await discogsViaProxy(f);
      log(`got: "${rg.artist}" — "${rg.title}" [${rg.genre}] ${rg.year}`, 'ok');
      log(rg.cover ? 'cover included' : 'no cover', rg.cover ? 'ok' : 'dim');
    } else if (source === 'archive') {
      rg = await iaViaProxy(f);
      log(`got: "${rg.artist}" — "${rg.title}" [${rg.collection}] ${rg.year}`, 'ok');
      log(rg.cover ? 'cover included' : 'no cover', rg.cover ? 'ok' : 'dim');
    } else {
      try {
        rg = await mbViaProxy(f);
      } catch(mbErr) {
        log(`[mb] failed, falling back to discogs`, 'warn');
        rg = await discogsViaProxy(f);
        log(`got: "${rg.artist}" — "${rg.title}" [${rg.genre}] ${rg.year}`, 'ok');
      }
      if (!rg.source || rg.source !== 'discogs') {
        log(`got: "${rg.artist}" — "${rg.title}" [${rg.type}] ${rg.year}`, 'ok');
        log('fetching tags...', 'dim');
        rg.tags = await fetchTags(rg.mbid);
        log('fetching cover...', 'dim');
        rg.cover = await fetchCoverUrl(rg.mbid, rg.artist, rg.title);
        log(rg.cover ? 'cover found' : 'no cover', rg.cover ? 'ok' : 'dim');
      }
    }
    render(rg);
  } catch(e) {
    log(`FATAL: ${e.message}`, 'err');
  }

  btn.classList.remove('ld'); btn.disabled = false;
  busy = false;
}


// ── RECORD STORE ─────────────────────────────────────────────────────────────
const STORE_GENRES = [
  'Rock', 'Electronic', 'Jazz', 'Hip Hop',
  'Classical', 'Folk, World, & Country', 'Funk / Soul', 'Latin'
];
let storeLoaded = false;
let storeOpen = false;

function toggleStore() {
  const overlay = document.getElementById('store-overlay');
  storeOpen = !storeOpen;
  overlay.classList.toggle('open', storeOpen);
  document.getElementById('storebtn').classList.toggle('on', storeOpen);
  if (storeOpen && !storeLoaded) loadStore();
}

async function loadStore() {
  storeLoaded = true;
  const body = document.getElementById('store-body');
  const status = document.getElementById('store-status');
  body.innerHTML = '';

  // Build shelf skeletons immediately
  STORE_GENRES.forEach(genre => {
    const row = document.createElement('div');
    row.className = 'shelf-row';
    row.id = `shelf-${genre.replace(/[^a-z]/gi,'_')}`;
    row.innerHTML = `
      <div class="shelf-label">${genre}</div>
      <div class="shelf-surface">
        <div class="shelf-records" id="records-${genre.replace(/[^a-z]/gi,'_')}">
          ${Array(5).fill('<div class="sleeve sleeve-loading"><div class="sleeve-inner"></div></div>').join('')}
        </div>
      </div>`;
    body.appendChild(row);
  });

  // Fetch all genres in parallel
  let loaded = 0;
  status.textContent = '0 / 8 loaded';

  const fetches = STORE_GENRES.map(async genre => {
    const results = [];
    const promises = Array(5).fill(0).map(async () => {
      try {
        const params = new URLSearchParams({ genre, format: 'Vinyl' });
        const data = await fetch('/api/discogs/random?' + params).then(r => r.json());
        if (data.artist && data.title) results.push(data);
      } catch {}
    });
    await Promise.allSettled(promises);

    // Render results into shelf
    const container = document.getElementById('records-' + genre.replace(/[^a-z]/gi,'_'));
    if (!container) return;
    container.innerHTML = '';

    if (!results.length) {
      container.innerHTML = '<div style="color:#4a3018;font-size:0.55rem;padding:8px 0;font-family:monospace;">no results</div>';
    } else {
      results.forEach(r => {
        const s = makeSleeve(r);
        container.appendChild(s);
      });
    }

    loaded++;
    status.textContent = `${loaded} / ${STORE_GENRES.length} loaded`;
  });

  await Promise.allSettled(fetches);
  status.textContent = 'loaded';
}

function makeSleeve(r) {
  const div = document.createElement('div');
  div.className = 'sleeve';

  const spineText = `${r.artist} — ${r.title}`;
  const artStyle = r.cover ? `background-image:url('${escA(r.cover)}')` : '';
  const placeholder = r.cover ? '' : '<div class="sleeve-art-placeholder"><span>◈</span></div>';

  div.innerHTML = `
    <div class="sleeve-inner">
      <div class="sleeve-spine"><span class="sleeve-spine-text">${esc(spineText)}</span></div>
      <div class="sleeve-art" style="${artStyle}">${placeholder}</div>
      <div class="sleeve-info">
        <div class="sleeve-artist">${esc(r.artist)}</div>
        <div class="sleeve-title">${esc(r.title)}</div>
        <div class="sleeve-year">${esc(r.year || '')} ${esc(r.country || '')}</div>
      </div>
    </div>`;

  div.addEventListener('click', () => {
    // Close store and open this release in main view
    toggleStore();
    openStoreRelease(r);
  });

  return div;
}

async function openStoreRelease(r) {
  if (busy) return;
  busy = true;
  const btn = document.getElementById('btn');
  btn.classList.add('ld'); btn.disabled = true;
  hideCard(); clrLog();
  log(`opening: "${r.artist}" — "${r.title}"`, 'info');

  // Result already has all needed fields — just render it
  const release = {
    source:   'discogs',
    artist:   r.artist,
    title:    r.title,
    url:      r.url || '',
    cover:    r.cover || null,
    tags:     r.tags || [],
    year:     r.year || '',
    type:     r.type || 'album',
    genre:    r.genre || '',
    label:    r.label || '',
    country:  r.country || '',
    catno:    r.catno || '',
    release_id: r.release_id || '',
    mbid:     null,
    secondaryTypes: [],
  };

  render(release);
  btn.classList.remove('ld'); btn.disabled = false;
  busy = false;
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function tryJSON(s) {
  if (!s) return null;
  s = s.replace(/```json\s*/gi,'').replace(/```\s*/gi,'').trim();
  const a=s.indexOf('{'), b=s.lastIndexOf('}');
  if (a<0||b<0) return null;
  try { return JSON.parse(s.slice(a,b+1)); } catch { return null; }
}
function pill(t, cls='') { return `<span class="pill ${cls}">${esc(t)}</span>`; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

function showCard() {
  document.getElementById('empty').style.display='none';
  const c=document.getElementById('card');
  c.classList.remove('on'); void c.offsetWidth; c.classList.add('on');
}
function hideCard() {
  document.getElementById('empty').style.display='block';
  document.getElementById('card').classList.remove('on');
  document.getElementById('simbtn').classList.remove('vis');
}
</script>
